name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run black --check .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/unit -v --cov --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: badi
          POSTGRES_PASSWORD: badi
          POSTGRES_DB: badi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U badi -d badi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://badi:badi@localhost:5432/badi_test
      DATABASE_URL: postgresql://badi:badi@localhost:5432/badi_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run python scripts/migrate.py
      - run: uv run pytest tests/integration -v -m integration
