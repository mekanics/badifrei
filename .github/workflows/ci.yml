name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      # TODO: enforce formatting once codebase is formatted — run `ruff format .` locally and commit
      # - run: uv run ruff format --check .

  unit-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://badi:badi@localhost:5432/badi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/unit -v --cov --cov-report=xml
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: collector
            dockerfile: collector/Dockerfile
          - name: api
            dockerfile: api/Dockerfile
          - name: ml
            dockerfile: ml/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f ${{ matrix.dockerfile }} -t badifrei-${{ matrix.name }}:ci .

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: badi
          POSTGRES_PASSWORD: badi
          POSTGRES_DB: badi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U badi -d badi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://badi:badi@localhost:5432/badi_test
      DATABASE_URL: postgresql://badi:badi@localhost:5432/badi_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run python scripts/migrate.py
      # Exclude compose-stack tests (require running API + Docker Compose — not available in CI)
      # --co -q first to check what's collected; exit 5 (no tests) is treated as success
      - run: uv run pytest tests/integration -v -m integration --ignore=tests/integration/test_docker_compose.py -p no:cacheprovider || [ $? -eq 5 ]
