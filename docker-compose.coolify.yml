# docker-compose.coolify.yml — Production config for Coolify
# Env vars are injected via Coolify UI (no .env file needed)
# The API service is exposed via Coolify's proxy (Traefik) — no port mapping needed here

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badi -d badi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1200M
        reservations:
          memory: 512M

  migrator:
    build:
      context: .
      dockerfile: collector/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ["python", "scripts/migrate.py"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    environment:
      WS_URL: wss://badi-public.crowdmonitor.ch:9591/api
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "8000"
    volumes:
      - model_artifacts:/app/ml/models
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    labels:
      # Traefik rate limiting — 60 req/min average, burst of 30
      - "traefik.http.middlewares.badi-ratelimit.ratelimit.average=60"
      - "traefik.http.middlewares.badi-ratelimit.ratelimit.burst=30"
      - "traefik.http.middlewares.badi-ratelimit.ratelimit.period=1m"
      # Apply rate limit + compress middleware to the api router
      - "traefik.http.routers.api.middlewares=badi-ratelimit,badi-compress"
      - "traefik.http.middlewares.badi-compress.compress=true"

  retrain:
    build:
      context: .
      dockerfile: ml/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RETRAIN_INTERVAL_HOURS: ${RETRAIN_INTERVAL_HOURS:-168}
      MIN_RECORDS_FOR_TRAINING: ${MIN_RECORDS_FOR_TRAINING:-1000}
      LOOKBACK_DAYS: ${LOOKBACK_DAYS:-90}
    volumes:
      - model_artifacts:/app/ml/models
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 60s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  db_data:
  model_artifacts:
