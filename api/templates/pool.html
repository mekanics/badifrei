{% extends "base.html" %}
{% block title %}{{ pool.name }} — Badi Predictor{% endblock %}
{% block content %}
<a href="/" class="back-link">← All Pools</a>
<div class="pool-detail-header">
  <h1>{{ pool.name }}</h1>
  <span class="badge badge-{{ pool.type }}">{{ pool.type }}</span>
  {% if pool.max_capacity > 0 %}
  <span class="capacity-label">Capacity: {{ pool.max_capacity }}</span>
  {% endif %}
</div>

<div class="date-row">
  <label for="date-picker">Date:</label>
  <input type="date" id="date-picker">
</div>

<div id="no-model-msg" class="no-model" style="display:none">No prediction model available for this pool yet.</div>
<div class="chart-wrap">
  <canvas id="occupancy-chart"></canvas>
</div>
<p id="chart-legend-note" class="chart-legend-note"></p>

<style>
  .chart-legend-note {
    text-align: center;
    font-size: 0.82rem;
    color: #888;
    margin-top: 0.25rem;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const POOL_UID = {{ pool.uid | tojson }};

  function todayZurich() {
    return new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Zurich' });
  }

  function currentZurichHour() {
    return parseInt(new Date().toLocaleString('en-US', { timeZone: 'Europe/Zurich', hour: 'numeric', hour12: false }), 10);
  }

  const picker = document.getElementById('date-picker');
  picker.value = todayZurich();

  const ctx = document.getElementById('occupancy-chart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length: 24}, (_, i) => String(i).padStart(2,'0') + ':00'),
      datasets: [
        {
          label: 'Actual Occupancy %',
          data: Array(24).fill(null),
          borderColor: '#34d399',
          backgroundColor: 'rgba(52,211,153,0.1)',
          fill: false,
          tension: 0.3,
          pointRadius: 3,
          borderDash: [],
        },
        {
          label: 'Predicted Occupancy %',
          data: Array(24).fill(null),
          borderColor: '#4f8ef7',
          backgroundColor: 'rgba(79,142,247,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          borderDash: [5, 5],
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: { min: 0, max: 100, title: { display: true, text: 'Occupancy %' } },
        x: { title: { display: true, text: 'Hour' } }
      },
      plugins: { legend: { display: true } }
    }
  });

  async function loadChart(date) {
    const today = todayZurich();
    const isPast = date < today;
    const isToday = date === today;
    const isFuture = date > today;

    try {
      // Always fetch predictions
      const predRes = await fetch(`/predict/range?pool_uid=${encodeURIComponent(POOL_UID)}&date=${date}`);
      if (!predRes.ok) return;
      const predData = await predRes.json();
      const predValues = predData.predictions.map(p => p.predicted_occupancy_pct);
      const allZero = predValues.every(v => v === 0.0);
      document.getElementById('no-model-msg').style.display = allZero ? 'block' : 'none';
      chart.data.datasets[1].data = predValues;

      // Fetch actuals for past/today
      let actuals = Array(24).fill(null);
      if (isPast || isToday) {
        try {
          const histRes = await fetch(`/api/history?pool_uid=${encodeURIComponent(POOL_UID)}&date=${date}`);
          if (histRes.ok) {
            const histData = await histRes.json();
            actuals = histData.actuals.map(a => a.occupancy_pct);
            // For today: null out future hours
            if (isToday) {
              const currentHour = currentZurichHour();
              actuals = actuals.map((v, i) => i <= currentHour ? v : null);
            }
          }
        } catch (e) {
          console.warn('History fetch failed', e);
        }
      }
      chart.data.datasets[0].data = actuals;

      chart.update();

      // Update legend note
      const note = document.getElementById('chart-legend-note');
      note.textContent = isFuture
        ? '╌ Predicted only'
        : '— Actual (green)  ╌ Predicted (blue)';
    } catch (e) {
      console.warn('Predict fetch failed', e);
    }
  }

  loadChart(picker.value);
  picker.addEventListener('change', () => loadChart(picker.value));
</script>
{% endblock %}
